<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chat — Getting Started</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; height: 100dvh; display: flex; flex-direction: column; background: #0f0f0f; color: #e8e8e8; }
      #chat { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
      .msg { max-width: 75%; padding: 0.6rem 0.9rem; border-radius: 12px; line-height: 1.5; white-space: pre-wrap; }
      .msg.user { align-self: flex-end; background: #2563eb; color: #fff; }
      .msg.assistant { align-self: flex-start; background: #1e1e1e; border: 1px solid #333; }
      #form { display: flex; gap: 0.5rem; padding: 0.75rem 1rem; border-top: 1px solid #222; }
      #input { flex: 1; padding: 0.6rem 0.9rem; border-radius: 8px; border: 1px solid #333; background: #1e1e1e; color: #e8e8e8; font-size: 1rem; outline: none; }
      #input:focus { border-color: #2563eb; }
      #send { padding: 0.6rem 1.2rem; border-radius: 8px; border: none; background: #2563eb; color: #fff; font-size: 1rem; cursor: pointer; }
      #send:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
  </head>
  <body>
    <div id="chat"></div>
    <form id="form">
      <input id="input" type="text" placeholder="Ask anything…" autocomplete="off" />
      <button id="send" type="submit">Send</button>
    </form>
    <script type="module" src="./src/frontend.tsx"></script>
  </body>
</html>
